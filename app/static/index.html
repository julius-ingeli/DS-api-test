<!doctype html>
<html lang="sk">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Benefit Router</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f9;
        --surface: #ffffff;
        --text: #19212a;
        --muted: #5d6875;
        --line: #d8dee6;
        --accent: #0f766e;
        --accent-dark: #0b5f59;
        --danger: #b42318;
        --code-bg: #101828;
        --code-text: #f2f4f7;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        line-height: 1.5;
      }

      main {
        width: min(1120px, calc(100% - 32px));
        margin: 0 auto;
        padding: 40px 0;
      }

      header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: clamp(28px, 5vw, 46px);
        line-height: 1.05;
        font-weight: 750;
        letter-spacing: 0;
      }

      h2 {
        margin: 0 0 14px;
        font-size: 20px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: var(--muted);
      }

      nav {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      nav a {
        color: var(--accent-dark);
        text-decoration: none;
        font-weight: 650;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr);
        gap: 20px;
        align-items: start;
      }

      section {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 20px;
        box-shadow: 0 1px 2px rgba(16, 24, 40, 0.04);
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 700;
      }

      textarea {
        width: 100%;
        min-height: 180px;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 12px;
        color: var(--text);
        font: inherit;
        line-height: 1.45;
      }

      textarea:focus,
      button:focus-visible {
        outline: 3px solid rgba(15, 118, 110, 0.22);
        outline-offset: 2px;
        border-color: var(--accent);
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-top: 14px;
      }

      button {
        border: 0;
        border-radius: 6px;
        background: var(--accent);
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-weight: 750;
        padding: 10px 16px;
        min-height: 44px;
      }

      button:hover {
        background: var(--accent-dark);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.72;
      }

      .status {
        min-height: 24px;
        color: var(--muted);
      }

      .error {
        color: var(--danger);
      }

      .summary {
        display: grid;
        gap: 12px;
        margin-bottom: 16px;
      }

      .row {
        display: grid;
        grid-template-columns: 132px minmax(0, 1fr);
        gap: 12px;
        border-bottom: 1px solid var(--line);
        padding-bottom: 10px;
      }

      .row:last-child {
        border-bottom: 0;
        padding-bottom: 0;
      }

      .key {
        color: var(--muted);
        font-weight: 700;
      }

      .value {
        min-width: 0;
        overflow-wrap: anywhere;
      }

      pre {
        min-height: 220px;
        max-height: 520px;
        overflow: auto;
        margin: 0;
        background: var(--code-bg);
        color: var(--code-text);
        border-radius: 8px;
        padding: 14px;
        font: 13px/1.45 ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      .api {
        margin-top: 20px;
      }

      .api code {
        background: #eef4f3;
        color: #134e4a;
        border-radius: 4px;
        padding: 2px 5px;
      }

      @media (max-width: 820px) {
        main {
          width: min(100% - 24px, 1120px);
          padding: 24px 0;
        }

        header,
        .layout {
          display: block;
        }

        nav {
          margin-top: 14px;
        }

        section + section {
          margin-top: 16px;
        }

        .row {
          grid-template-columns: 1fr;
          gap: 2px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>Benefit Router</h1>
          <p>Zadajte symptomy a API vrati vybranu kategoriu, sluzby a benefit.</p>
        </div>
        <nav aria-label="API links">
          <a href="/docs">API docs</a>
          <a href="/health">Health</a>
          <a href="/version">Version</a>
        </nav>
      </header>

      <div class="layout">
        <section aria-labelledby="input-title">
          <h2 id="input-title">Input</h2>
          <form id="route-form">
            <label for="symptoms">Symptomy</label>
            <textarea id="symptoms" name="symptoms" autocomplete="off" spellcheck="true">mam vyrazku na kozi</textarea>
            <div class="actions">
              <button id="submit" type="submit">Vyhodnotit</button>
              <span id="status" class="status" role="status"></span>
            </div>
          </form>
        </section>

        <section aria-labelledby="output-title">
          <h2 id="output-title">Output</h2>
          <div class="summary" aria-live="polite">
            <div class="row">
              <div class="key">Category</div>
              <div id="category" class="value">-</div>
            </div>
            <div class="row">
              <div class="key">Clinic 1</div>
              <div id="clinic1" class="value">-</div>
            </div>
            <div class="row">
              <div class="key">Clinic 2</div>
              <div id="clinic2" class="value">-</div>
            </div>
            <div class="row">
              <div class="key">Benefit</div>
              <div id="benefit" class="value">-</div>
            </div>
          </div>
          <pre id="raw-output">{}</pre>
        </section>
      </div>

      <section class="api" aria-labelledby="api-title">
        <h2 id="api-title">API</h2>
        <p>POST <code>/route</code> with JSON <code>{"symptom_source":"free_text","symptom_value":"..."}</code>, or call GET <code>/route?symptom_value=...</code>.</p>
      </section>
    </main>

    <script>
      const form = document.querySelector("#route-form");
      const textarea = document.querySelector("#symptoms");
      const submit = document.querySelector("#submit");
      const statusEl = document.querySelector("#status");
      const rawOutput = document.querySelector("#raw-output");

      const fields = {
        category: document.querySelector("#category"),
        clinic1: document.querySelector("#clinic1"),
        clinic2: document.querySelector("#clinic2"),
        benefit: document.querySelector("#benefit")
      };

      function setText(element, value) {
        element.textContent = value || "-";
      }

      function renderResult(data) {
        setText(fields.category, data.category);
        setText(fields.clinic1, data.clinic_1);
        setText(fields.clinic2, data.clinic_2);
        setText(fields.benefit, data.benefit);
        rawOutput.textContent = JSON.stringify(data, null, 2);
      }

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        const symptomValue = textarea.value.trim();

        if (!symptomValue) {
          statusEl.textContent = "Zadajte symptomy.";
          statusEl.classList.add("error");
          return;
        }

        submit.disabled = true;
        statusEl.textContent = "Spracuvam...";
        statusEl.classList.remove("error");

        try {
          const response = await fetch("/route", {
            method: "POST",
            headers: {
              "Content-Type": "application/json"
            },
            body: JSON.stringify({
              symptom_source: "free_text",
              symptom_value: symptomValue
            })
          });

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.detail || "Request failed");
          }

          renderResult(data);
          statusEl.textContent = "Hotovo";
        } catch (error) {
          statusEl.textContent = error.message;
          statusEl.classList.add("error");
        } finally {
          submit.disabled = false;
        }
      });
    </script>
  </body>
</html>
