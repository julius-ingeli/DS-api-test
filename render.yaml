services:
  - type: web
    name: benefit-router-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: RULES_JSON_PATH
        value: rules/rules.json
      - key: CORS_ALLOW_ORIGINS
        value: "*"
      - key: LOG_ROUTE_REQUESTS
        value: "true"
      - key: ROUTE_LOG_PATH
        value: logs/route_requests.jsonl
